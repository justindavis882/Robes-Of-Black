<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric to JSON Converter</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }
        h2 {
            color: #ff5555;
            letter-spacing: 1px;
        }
        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #aaaaaa;
        }
        input, textarea {
            width: 100%;
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 1rem;
        }
        textarea {
            height: 300px;
            resize: vertical;
        }
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            background-color: #ff5555;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #ff7777;
        }
        button.secondary {
            background-color: #444;
        }
        button.secondary:hover {
            background-color: #666;
        }
        pre {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #444;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h2>Lyric to JSON Converter</h2>
    
    <label for="songTitle">Song Title:</label>
    <input type="text" id="songTitle" placeholder="e.g., Sober - Tool">

    <label for="rawLyrics">Paste Lyrics (Use [Section Name] for markers):</label>
    <textarea id="rawLyrics" placeholder="[Verse 1]&#10;There's a shadow just behind me&#10;Shrouding every step I take&#10;&#10;[Chorus 1]&#10;Why can't we not be sober?"></textarea>

    <div class="button-group">
        <button onclick="convertLyrics()">Generate JSON</button>
        <button class="secondary" onclick="downloadJson()">Download .json File</button>
    </div>

    <label>Output:</label>
    <pre id="jsonOutput">Your formatted JSON will appear here...</pre>

    <script>
        let currentJson = "";
        let currentFileName = "lyrics.json";

        function convertLyrics() {
            const title = document.getElementById('songTitle').value.trim();
            const rawText = document.getElementById('rawLyrics').value;
            
            // Initialize the object with the title
            const songData = {
                title: title || "Untitled Track"
            };

            // Regex to find markers like [Verse 1] or [Chorus]
            const sectionRegex = /\[(.*?)\]/g;
            let match;
            const sections = [];

            // Find all bracketed sections and their positions
            while ((match = sectionRegex.exec(rawText)) !== null) {
                sections.push({
                    name: match[1].trim(),
                    index: match.index,
                    endIndex: match.index + match[0].length
                });
            }

            if (sections.length === 0) {
                alert("No [bracketed] sections found! Please format your markers like [Verse 1].");
                return;
            }

            // Extract the text between each bracketed section
            for (let i = 0; i < sections.length; i++) {
                const section = sections[i];
                const nextSection = sections[i + 1];
                
                const textStart = section.endIndex;
                const textEnd = nextSection ? nextSection.index : rawText.length;
                
                // Grab the text, trim whitespace, and add to object
                let sectionText = rawText.substring(textStart, textEnd).trim();
                songData[section.name] = sectionText;
            }

            // Convert object to JSON string with 4 spaces for formatting
            currentJson = JSON.stringify(songData, null, 4);
            document.getElementById('jsonOutput').innerText = currentJson;
            
            // Generate a URL-friendly filename (e.g., "Sober - Tool" -> "sober-tool.json")
            if (title) {
                currentFileName = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') + '.json';
            } else {
                currentFileName = 'untitled-track.json';
            }
        }

        function downloadJson() {
            if (!currentJson) {
                alert("Please click 'Generate JSON' first.");
                return;
            }
            
            const blob = new Blob([currentJson], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFileName;
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
